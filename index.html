<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Графический диктант</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{min-height:100%;height:-webkit-fill-available}
body{
  min-height:100vh;min-height:-webkit-fill-available;
  width:100%;overflow:hidden;
  background:#120818;
  font-family:'Nunito','Segoe UI',Arial,sans-serif;
  color:#fff;
  position:fixed;top:0;left:0;right:0;bottom:0;
}
.screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;transition:opacity .22s}
.screen.hidden{opacity:0;pointer-events:none}

#screen-menu{background:#120818;overflow-y:auto;-webkit-overflow-scrolling:touch;align-items:stretch;}
.menu-inner{display:flex;flex-direction:column;align-items:center;padding:36px 18px 32px;width:100%;}
.menu-logo{font-size:40px;margin-bottom:6px;line-height:1}
.menu-title{font-size:24px;font-weight:900;background:linear-gradient(135deg,#ff6bb3,#e040fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;letter-spacing:-.3px;}
.menu-sub{font-size:13px;color:#9471a8;font-weight:600;margin-bottom:24px}
.menu-xp-wrap{width:100%;margin-bottom:28px}
.menu-xp-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.menu-xp-title{font-size:11px;font-weight:800;color:#7a5585;text-transform:uppercase;letter-spacing:.7px}
.menu-xp-count{font-size:13px;font-weight:900;color:#ff6bb3}
.menu-xp-outer{position:relative;padding-top:20px}
.menu-xp-milestones{position:absolute;top:0;left:0;width:100%;display:flex;align-items:flex-end;pointer-events:none;height:20px;}
.menu-xp-ms{position:absolute;display:flex;flex-direction:column;align-items:center;transform:translateX(-50%);transition:filter .35s, transform .35s;}
.menu-xp-ms .ms-star{font-size:14px;line-height:1;filter:grayscale(1) brightness(.45);transition:filter .35s,transform .35s}
.menu-xp-ms.lit .ms-star{filter:none;transform:scale(1.2)}
.menu-xp-ms .ms-tick{width:2px;height:6px;background:#3a1f4a;border-radius:1px;margin-top:1px;transition:background .35s}
.menu-xp-ms.lit .ms-tick{background:#e040fb}
.menu-xp-track{width:100%;height:14px;background:#1e0d28;border-radius:7px;border:1.5px solid #3a1f4a;overflow:hidden;}
.menu-xp-fill{height:100%;border-radius:7px;background:linear-gradient(90deg,#c026d3,#e040fb,#ff6bb3);transition:width .6s cubic-bezier(.34,1.1,.64,1);min-width:0;position:relative;overflow:hidden;}
.menu-xp-fill::after{content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:bar-shimmer 2.5s linear infinite;}
.sec-label{width:100%;font-size:11px;font-weight:800;color:#6b4478;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-left:2px;display:flex;align-items:center;gap:6px;}
.sec-label::after{content:'';flex:1;height:1px;background:#2a1535}
.grid-list{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;margin-bottom:24px}
.fig-btn{background:#1e0d28;border:2px solid #3a1f4a;border-radius:20px;padding:16px 6px 13px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;position:relative;overflow:hidden;transition:transform .12s cubic-bezier(.34,1.56,.64,1),border-color .12s,box-shadow .12s;-webkit-user-select:none;user-select:none;}
.fig-btn:hover{border-color:#e040fb;transform:translateY(-3px);box-shadow:0 8px 24px rgba(224,64,251,.2);}
.fig-btn:active{transform:scale(.91);box-shadow:none}
.fig-btn .fe{font-size:30px;line-height:1;margin-bottom:4px}
.fig-btn .fl{font-size:11px;font-weight:800;color:#f0d6f5;text-align:center;line-height:1.2}
.fig-btn .fc{font-size:9px;color:#7a5585;margin-top:2px;font-weight:600}
.fig-btn.done{background:#1c0a2a;border-color:#c026d3}
.fig-btn.done:hover{border-color:#e879f9;box-shadow:0 8px 24px rgba(192,38,211,.25)}
.fig-btn.done .fl{color:#f0abfc}
.fig-btn.done .fc{color:#a855f7;font-weight:700}
.fig-btn .done-badge{position:absolute;top:8px;right:8px;width:18px;height:18px;background:#a855f7;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;}
.fig-btn .fbar{position:absolute;bottom:0;left:0;height:3px;border-radius:0 0 18px 18px;background:linear-gradient(90deg,#e040fb,#ff6bb3);transition:width .4s ease;}

#screen-game{background:#120818;justify-content:flex-start}
.progress-wrap{width:100%;height:18px;background:#1e0d28;flex-shrink:0;position:relative;border-bottom:1px solid #3a1f4a;}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,#c026d3,#e040fb,#ff6bb3);transition:width .5s cubic-bezier(.34,1.1,.64,1);position:relative;overflow:hidden;}
.progress-fill::after{content:'';position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.35),transparent);animation:bar-shimmer 2s linear infinite;}
@keyframes bar-shimmer{0%{left:-60%}100%{left:160%}}
.progress-stars{position:absolute;top:0;left:0;height:100%;display:flex;align-items:center;padding:0 6px;gap:3px;pointer-events:none;z-index:2;}

/* ★ FIXED: progress-star lit state now shows gold */
.progress-star{font-size:9px;filter:grayscale(1) brightness(.4);transition:filter .3s,transform .3s;}
.progress-star.lit{filter:none;transform:scale(1.3);animation:star-pop .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes star-pop{0%{transform:scale(0.5)}60%{transform:scale(1.5)}100%{transform:scale(1.3)}}

.game-header{width:100%;display:flex;align-items:center;gap:10px;padding:10px 14px 4px;flex-shrink:0;}
.back-btn{background:#1e0d28;border:1.5px solid #3a1f4a;color:#f0d6f5;width:36px;height:36px;border-radius:12px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:900;transition:background .12s,border-color .12s,transform .1s;}
.back-btn:hover{background:#2d1040;border-color:#e040fb}
.back-btn:active{transform:scale(.88)}
.game-title{font-size:16px;font-weight:900;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.3px;}
.step-info{font-size:11px;font-weight:800;background:#1e0d28;border:1.5px solid #3a1f4a;padding:4px 9px;border-radius:10px;color:#9471a8;flex-shrink:0;}
.step-banner{width:100%;padding:6px 14px 8px;flex-shrink:0;display:flex;align-items:center;gap:10px;}
.step-arrow{font-size:22px;width:48px;height:48px;min-width:48px;display:flex;align-items:center;justify-content:center;border-radius:14px;font-weight:900;border:2px solid transparent;transition:transform .15s cubic-bezier(.34,1.56,.64,1),box-shadow .15s,border-color .15s;cursor:default;}
.step-arrow:hover{transform:scale(1.18);box-shadow:0 4px 20px rgba(0,0,0,.4)}
@keyframes shake{0%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}100%{transform:translateX(0)}}
.shake{animation:shake .32s ease}
.step-texts{flex:1;min-width:0}
.step-text{font-size:15px;font-weight:800;color:#f5e6ff;line-height:1.3}
.step-hint-txt{font-size:11px;color:#7a5585;margin-top:3px;font-weight:600}
.steps-row{width:100%;padding:4px 12px 6px;display:flex;gap:5px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.steps-row::-webkit-scrollbar{display:none}
.s-chip{display:inline-flex;align-items:center;gap:1px;padding:4px 8px;border-radius:8px;font-size:11px;font-weight:800;border:1.5px solid #2d1040;flex-shrink:0;background:#1a0922;color:#5a3568;transition:all .15s;}
.s-chip.done{color:#a855f7;border-color:#7e22ce55;background:#1c0a2a}
.s-chip.cur{background:#2d1040;color:#f5e6ff;border-color:#e040fb;transform:scale(1.06)}
#canvas-wrap{flex:1;width:100%;position:relative;min-height:0;overflow:hidden;touch-action:none}
#canvas-wrap canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#hint-arrow{position:absolute;pointer-events:none;z-index:20;font-size:32px;opacity:0;transition:opacity .18s;filter:drop-shadow(0 0 10px rgba(255,107,179,.8));transform:translate(-50%,-50%);}
#hint-arrow.show{opacity:1}
#praise{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%) scale(0);background:linear-gradient(135deg,#e040fb,#ff6bb3);color:#fff;border-radius:28px;padding:13px 24px;font-size:15px;font-weight:900;pointer-events:none;opacity:0;letter-spacing:-.2px;transition:transform .28s cubic-bezier(.34,1.56,.64,1),opacity .2s;white-space:nowrap;z-index:10;max-width:88vw;text-align:center;box-shadow:0 8px 32px rgba(224,64,251,.45);}
#praise.show{transform:translate(-50%,-50%) scale(1);opacity:1}

#screen-win{background:#120818}
#win-canvas-full{position:absolute;top:0;left:0;width:100%;height:100%}
.win-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:max(36px,env(safe-area-inset-bottom,24px));background:linear-gradient(to top,rgba(18,8,24,.97) 0%,rgba(18,8,24,.5) 55%,transparent 100%);}
.win-emoji-big{font-size:58px;margin-bottom:8px;filter:drop-shadow(0 0 20px rgba(255,107,179,.5))}
.win-title{font-size:24px;font-weight:900;margin-bottom:6px;text-align:center;letter-spacing:-.4px;background:linear-gradient(135deg,#ff6bb3,#e040fb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.win-sub{font-size:13px;color:#9471a8;font-weight:600;margin-bottom:24px;text-align:center;padding:0 28px}
.win-btns{display:flex;gap:10px}
.btn{padding:14px 30px;border-radius:18px;border:none;font-size:15px;font-weight:900;cursor:pointer;background:linear-gradient(135deg,#e040fb,#ff6bb3);color:#fff;letter-spacing:-.2px;box-shadow:0 4px 20px rgba(224,64,251,.4);transition:transform .12s cubic-bezier(.34,1.56,.64,1),box-shadow .12s;font-family:inherit;}
.btn:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 8px 28px rgba(224,64,251,.55)}
.btn:active{transform:scale(.93);box-shadow:none}
.btn.sec{background:#1e0d28;color:#f0d6f5;box-shadow:none;border:2px solid #3a1f4a;}
.btn.sec:hover{background:#2d1040;border-color:#e040fb;box-shadow:0 4px 16px rgba(224,64,251,.15)}
.star{position:fixed;pointer-events:none;font-size:22px;animation:fly 1.2s ease-out forwards;z-index:200}
@keyframes fly{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.3)}}
</style>
</head>
<body>

<div id="screen-menu" class="screen">
  <div class="menu-inner">
    <div class="menu-logo">✏️</div>
    <div class="menu-title">Графический диктант</div>
    <div class="menu-sub">Рисуй пальцем по клеточкам</div>
    <div class="menu-xp-wrap" id="menu-xp-wrap">
      <div class="menu-xp-label">
        <span class="menu-xp-title">Прогресс</span>

        <div class="menu-xp-milestones" id="menu-xp-stars"></div>

    <canvas id="draw-canvas"></canvas>
    <div id="hint-arrow"></div>

</div>

<div id="screen-win" class="screen hidden">

  </div>
</div>

function parseText(t){
  var steps=[],parts=t.split(',');
  for(var i=0;i<parts.length;i++){
    var p=parts[i].trim().toLowerCase(),m=p.match(/^(\d+)\s+(.+)$/);
    if(!m)continue;
    var n=parseInt(m[1]),d=m[2].trim(),dir=-1;
    if(d==='клетка вправо'||d==='клетки вправо'||d==='клеток вправо')dir=0;
    else if(d==='клетка влево'||d==='клетки влево'||d==='клеток влево')dir=1;
    else if(d==='клетка вверх'||d==='клетки вверх'||d==='клеток вверх')dir=2;
    else if(d==='клетка вниз'||d==='клетки вниз'||d==='клеток вниз')dir=3;
    else if(d.indexOf('вправо вверх')>=0)dir=4;
    else if(d.indexOf('вправо вниз')>=0)dir=5;
    else if(d.indexOf('влево вниз')>=0)dir=6;
    else if(d.indexOf('влево вверх')>=0)dir=7;
    if(dir>=0)steps.push([dir,n]);
  }
  return steps;
}

    f.steps=[];
    for(var j=0;j<f.pts.length-1;j++){
      var dx=f.pts[j+1][0]-f.pts[j][0],dy=f.pts[j+1][1]-f.pts[j][1];
      var ax=Math.abs(dx),ay=Math.abs(dy),dir;
      if(ay===0&&dx>0)dir=0;else if(ay===0&&dx<0)dir=1;
      else if(ax===0&&dy<0)dir=2;else if(ax===0&&dy>0)dir=3;

      else if(ax===ay&&dx<0&&dy>0)dir=6;else dir=7;
      f.steps.push([dir,Math.max(ax,ay)]);

  }

});

// ── WEB SPEECH API (TTS) — умный выбор голоса ──
var _bestVoice=null;
var _voicesReady=false;

function _pickBestVoice(){
  var voices=window.speechSynthesis.getVoices();
  if(!voices||!voices.length)return null;
  var ruVoices=voices.filter(function(v){return v.lang&&v.lang.toLowerCase().startsWith('ru');});
  if(!ruVoices.length)return voices.find(function(v){return v.lang&&v.lang.startsWith('ru');})||null;

  // Приоритеты: ищем женский/детский голос по имени
  // Порядок приоритетов: Milena (Яндекс, очень приятный) > Irina (Microsoft) >
  // Google русский женский > любой онлайн > любой локальный
  var priority=[
    /milena/i, /irina/i, /alyona/i, /alena/i, /katya/i,
    /google.*ru/i, /ru.*google/i,
    /female/i, /woman/i, /girl/i, /жен/i
  ];
  for(var p=0;p<priority.length;p++){
    var found=ruVoices.find(function(v){return priority[p].test(v.name);});
    if(found)return found;
  }
  // Предпочтём онлайн-голос (обычно качественнее)
  var online=ruVoices.find(function(v){return !v.localService;});
  if(online)return online;
  return ruVoices[0];
}

function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  // Небольшая пауза после cancel() — без неё Chrome иногда молчит
  setTimeout(function(){
    var utt=new SpeechSynthesisUtterance(text);
    utt.lang='ru-RU';
    // Детский эффект: чуть выше тон, чуть медленнее темп
    utt.pitch=1.35;   // 0–2, обычный=1; выше → детский/мягкий
    utt.rate=0.88;    // 0.1–10, обычный=1; немного медленнее = разборчивее
    utt.volume=1;
    if(!_bestVoice)_bestVoice=_pickBestVoice();
    if(_bestVoice)utt.voice=_bestVoice;
    window.speechSynthesis.speak(utt);
  },60);
}

if(window.speechSynthesis){
  var _initVoices=function(){
    _bestVoice=_pickBestVoice();
    _voicesReady=true;
  };
  window.speechSynthesis.onvoiceschanged=_initVoices;
  // На некоторых браузерах onvoiceschanged не стреляет — пробуем сразу
  setTimeout(_initVoices,300);
}

}

  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+start+dur);
  lfo.start(ctx.currentTime+start);lfo.stop(ctx.currentTime+start+dur+0.01);
  o.start(ctx.currentTime+start);o.stop(ctx.currentTime+start+dur+0.01);

// noise burst helper (для животных звуков без файлов)
function _noise(start,dur,vol,filterFreq){
  var ctx=ac(),buf=ctx.createBuffer(1,Math.ceil(ctx.sampleRate*dur),ctx.sampleRate);
  var d=buf.getChannelData(0);
  for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
  var src=ctx.createBufferSource(),filt=ctx.createBiquadFilter(),g=ctx.createGain();
  filt.type='bandpass';filt.frequency.value=filterFreq||800;filt.Q.value=2;
  src.buffer=buf;src.connect(filt);filt.connect(g);g.connect(ctx.destination);
  g.gain.setValueAtTime(0,ctx.currentTime+start);
  g.gain.linearRampToValueAtTime(vol||0.12,ctx.currentTime+start+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+start+dur*0.85);
  src.start(ctx.currentTime+start);src.stop(ctx.currentTime+start+dur+0.01);
}

function computeLayout(f){
  var x=0,y=0,mnx=0,mny=0,mxx=0,mxy=0;
  f.steps.forEach(function(s){
    x+=DIRS[s[0]][0]*s[1];y+=DIRS[s[0]][1]*s[1];
    if(x<mnx)mnx=x;if(x>mxx)mxx=x;
    if(y<mny)mny=y;if(y>mxy)mxy=y;
  });
  var fw=mxx-mnx,fh=mxy-mny;
  GN=Math.max(fw+4,fh+4,10);
  startGx=Math.floor((GN-fw)/2)-mnx;
  startGy=Math.floor((GN-fh)/2)-mny;
}

function initCanvas(){
  var w=canvasWrap.offsetWidth,h=canvasWrap.offsetHeight;
  if(!w||!h){setTimeout(initCanvas,30);return;}
  zoom=1;panX=0;panY=0;
  var dpr=window.devicePixelRatio||1;
  [gridCanvas,drawCanvas].forEach(function(c){
    c.width=Math.round(w*dpr);c.height=Math.round(h*dpr);
    c.style.width=w+'px';c.style.height=h+'px';
  });
  drawGrid();drawPath();
}

function csBase(){return GN>0?Math.min(canvasWrap.offsetWidth,canvasWrap.offsetHeight)/GN:1;}
function cs(){return csBase()*zoom;}
function gridOrigin(){
  var w=canvasWrap.offsetWidth,h=canvasWrap.offsetHeight;
  var ox=(w-csBase()*GN)/2+panX,oy=(h-csBase()*GN)/2+panY;
  return{ox:ox,oy:oy};
}
function gToC(gx,gy){
  var o=gridOrigin(),c=cs(),dpr=window.devicePixelRatio||1;
  return[(o.ox+gx*c)*dpr,(o.oy+gy*c)*dpr];
}
function gToPx(gx,gy){
  var o=gridOrigin(),c=cs();
  return[o.ox+gx*c,o.oy+gy*c];
}
function getGridPt(ex,ey){
  var rect=drawCanvas.getBoundingClientRect();
  var o=gridOrigin(),c=cs();
  return[Math.round((ex-rect.left-o.ox)/c),Math.round((ey-rect.top-o.oy)/c)];
}
function clampPan(){
  var w=canvasWrap.offsetWidth,h=canvasWrap.offsetHeight;
  var gw=csBase()*GN*zoom,gh=csBase()*GN*zoom;
  var mx=Math.min(w,h)*0.4;
  panX=Math.max(-(gw-mx),Math.min(gw-mx,panX));
  panY=Math.max(-(gh-mx),Math.min(gh-mx,panY));
}

function drawGrid(){
  var ctx=gridCanvas.getContext('2d');
  var W=gridCanvas.width,H=gridCanvas.height;
  ctx.clearRect(0,0,W,H);
  if(GN<=0)return;
  var dpr=window.devicePixelRatio||1;
  var c=cs()*dpr;
  var o=gridOrigin();
  var ox=o.ox*dpr,oy=o.oy*dpr;
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.10)';ctx.lineWidth=0.7;
  for(var i=0;i<=GN;i++){
    ctx.beginPath();ctx.moveTo(ox+i*c,oy);ctx.lineTo(ox+i*c,oy+GN*c);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ox,oy+i*c);ctx.lineTo(ox+GN*c,oy+i*c);ctx.stroke();
  }
  ctx.strokeStyle='rgba(255,107,179,0.35)';ctx.lineWidth=1.5;
  ctx.strokeRect(ox+0.75,oy+0.75,GN*c-1.5,GN*c-1.5);
  ctx.restore();
  var p=gToC(startGx,startGy);
  var dotR=Math.max(c*0.22,4*dpr);
  ctx.globalAlpha=1;ctx.fillStyle='#22c55e';
  ctx.beginPath();ctx.arc(p[0],p[1],dotR,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.9)';ctx.lineWidth=1.5*dpr;
  ctx.beginPath();ctx.arc(p[0],p[1],dotR,0,Math.PI*2);ctx.stroke();
}

function drawPath(){
  var ctx=drawCanvas.getContext('2d');
  ctx.clearRect(0,0,drawCanvas.width,drawCanvas.height);
  if(!cur||drawnPath.length<2)return;
  var c=cs()*(window.devicePixelRatio||1);
  ctx.strokeStyle=cur.color;ctx.lineWidth=c*0.24;
  ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();
  var p0=gToC(drawnPath[0][0],drawnPath[0][1]);ctx.moveTo(p0[0],p0[1]);
  for(var i=1;i<drawnPath.length;i++){var p=gToC(drawnPath[i][0],drawnPath[i][1]);ctx.lineTo(p[0],p[1]);}
  ctx.stroke();
}

  stepInfo.textContent=(stepIdx+1)+' / '+cur.steps.length;

    else if(i===stepIdx){el.className='s-chip cur';el.style.color='#ff6bb3';el.style.borderColor='#ff6bb3';}
    else{el.className='s-chip';el.style.color='';el.style.borderColor='';}
  });
  var chip=document.getElementById('chip-'+stepIdx);
  if(chip)chip.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}

function showWrongMove(gx,gy){
  SND.wrong();
  stepArrow.classList.remove('shake');void stepArrow.offsetWidth;
  stepArrow.classList.add('shake');
  setTimeout(function(){stepArrow.classList.remove('shake');},350);
  var ctx=drawCanvas.getContext('2d');
  var c=cs()*(window.devicePixelRatio||1);
  var pos=getCurrentPos(),p0=gToC(pos[0],pos[1]),p=gToC(gx,gy);
  ctx.save();
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=c*0.22;
  ctx.lineCap='round';ctx.setLineDash([c*0.3,c*0.3]);
  ctx.beginPath();ctx.moveTo(p0[0],p0[1]);ctx.lineTo(p[0],p[1]);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
  setTimeout(drawPath,350);
  var hp=gToPx(pos[0],pos[1]);
  hintArrow.textContent=ARR[cur.steps[stepIdx][0]];
  hintArrow.style.left=hp[0]+'px';hintArrow.style.top=hp[1]+'px';
  hintArrow.classList.add('show');
  if(hintTimer)clearTimeout(hintTimer);
  hintTimer=setTimeout(function(){hintArrow.classList.remove('show');},1200);
}

function getCurrentPos(){return drawnPath.length?drawnPath[drawnPath.length-1]:[startGx,startGy];}

function tryAdvance(gx,gy){
  if(stepIdx>=cur.steps.length)return;
  var pos=getCurrentPos(),dx=gx-pos[0],dy=gy-pos[1];
  if(dx===0&&dy===0)return;
  var s=cur.steps[stepIdx];
  var ex=DIRS[s[0]][0],ey=DIRS[s[0]][1];
  var ndx=dx===0?0:(dx>0?1:-1);
  var ndy=dy===0?0:(dy>0?1:-1);
  if(ndx===ex&&ndy===ey){
    SND.ping();
    if(!drawnPath.length)drawnPath.push([startGx,startGy]);
    drawnPath.push([pos[0]+ex,pos[1]+ey]);
    subStep++;drawPath();
    stepArrow.style.transform='scale(1.3)';
    setTimeout(function(){stepArrow.style.transform='';},140);
    if(subStep>=s[1]){
      subStep=0;stepIdx++;
      if(stepIdx>0&&stepIdx%5===0&&stepIdx<cur.steps.length){
        var pool=stepIdx>=cur.steps.length*.75?PRAISE_LATE:PRAISE_POOL;
        if(praiseUsed.length>=pool.length)praiseUsed=[];
        var avail=pool.filter(function(_,i){return praiseUsed.indexOf(i)<0;});
        var pick=avail[Math.floor(Math.random()*avail.length)];
        praiseUsed.push(pool.indexOf(pick));
        showPraise(pick);
      }
      if(stepIdx>=cur.steps.length){showWin();return;}
    }
    updateBanner();
  } else {
    showWrongMove(gx,gy);
  }
}

drawCanvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  if(e.touches.length===2){
    pinchActive=true;drawActive=false;
    var t0=e.touches[0],t1=e.touches[1];
    pinchDist0=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
    pinchZoom0=zoom;
    pinchMidX=(t0.clientX+t1.clientX)/2;pinchMidY=(t0.clientY+t1.clientY)/2;
  } else {
    pinchActive=false;drawActive=true;
    var t=e.touches[0];lastPt=getGridPt(t.clientX,t.clientY);
    if(!drawnPath.length){drawnPath.push([startGx,startGy]);drawPath();}
  }
},{passive:false});

drawCanvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(e.touches.length===2){
    var t0=e.touches[0],t1=e.touches[1];
    var dist=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
    var nz=Math.max(1,Math.min(4,pinchZoom0*(dist/pinchDist0)));
    var midX=(t0.clientX+t1.clientX)/2,midY=(t0.clientY+t1.clientY)/2;
    var rect=drawCanvas.getBoundingClientRect();
    var cx=midX-rect.left,cy=midY-rect.top;
    var w=canvasWrap.offsetWidth,h=canvasWrap.offsetHeight;
    var bOx=(w-csBase()*GN)/2,bOy=(h-csBase()*GN)/2;
    var gCX=(cx-(bOx+panX))/(csBase()*zoom);
    var gCY=(cy-(bOy+panY))/(csBase()*zoom);
    zoom=nz;
    panX=cx-bOx-gCX*csBase()*zoom+(midX-pinchMidX);
    panY=cy-bOy-gCY*csBase()*zoom+(midY-pinchMidY);
    clampPan();drawGrid();drawPath();
  } else {
    if(!drawActive||pinchActive)return;
    var t=e.touches[0],p=getGridPt(t.clientX,t.clientY);
    if(lastPt&&(p[0]!==lastPt[0]||p[1]!==lastPt[1])){tryAdvance(p[0],p[1]);lastPt=p;}
  }
},{passive:false});

drawCanvas.addEventListener('touchend',function(e){
  if(e.touches.length<2)pinchActive=false;
  if(e.touches.length===0)drawActive=false;
},{passive:false});

drawCanvas.addEventListener('click',function(e){
  if(!drawnPath.length){drawnPath.push([startGx,startGy]);drawPath();}
  tryAdvance.apply(null,getGridPt(e.clientX,e.clientY));
});

function showPraise(msg){
  SND.praise();
  // Убираем эмодзи для TTS — только текст
  var textOnly=msg.replace(/[\u{1F300}-\u{1FFFF}]/gu,'')
                  .replace(/[\u2600-\u27BF]/g,'')
                  .replace(/\uFE0F/g,'')
                  .replace(/\s+/g,' ').trim();
  // Задержка: сначала звук praise, потом голос
  setTimeout(function(){speak(textOnly);},200);
  praiseEl.textContent=msg;praiseEl.classList.add('show');spawnStars();
  setTimeout(function(){praiseEl.classList.remove('show');},2000);
}

function spawnStars(){
  var em=['⭐','🌟','✨','💫','🎉','💖','🌸'];
  for(var i=0;i<7;i++){
    (function(i){setTimeout(function(){
      var el=document.createElement('div');el.className='star';
      el.textContent=em[Math.floor(Math.random()*em.length)];
      el.style.left=(10+Math.random()*80)+'vw';el.style.top=(15+Math.random()*65)+'vh';
      el.style.setProperty('--tx',(Math.random()-.5)*160+'px');
      el.style.setProperty('--ty',(-70-Math.random()*110)+'px');
      document.body.appendChild(el);
      setTimeout(function(){SND.star();},i*80);
      setTimeout(function(){el.remove();},1300);
    },i*100);})(i);
  }
}

function showWin(){
  progress[cur.idx]=100;
  updateProgressBar(100);
  setTimeout(function(){SND.win();},300);
  setTimeout(function(){
    document.getElementById('win-emoji').textContent=cur.emoji;
    document.getElementById('win-title').textContent='Вот что получилось!';
    document.getElementById('win-sub').textContent='«'+cur.name+'» нарисован за '+cur.totalSteps+' ходов 🎉';
    var wc=winCanvasFull,W=window.innerWidth,H=window.innerHeight,dpr=window.devicePixelRatio||1;
    wc.width=Math.round(W*dpr);wc.height=Math.round(H*dpr);
    wc.style.width=W+'px';wc.style.height=H+'px';
    var pathPts=[[startGx,startGy]],x=startGx,y=startGy;
    cur.steps.forEach(function(s){for(var k=0;k<s[1];k++){x+=DIRS[s[0]][0];y+=DIRS[s[0]][1];pathPts.push([x,y]);}});
    var cs2=Math.min(W,H)/GN,ox=(W-cs2*GN)/2,oy=(H-cs2*GN)/2;
    function toPx(gx,gy){return[(ox+gx*cs2)*dpr,(oy+gy*cs2)*dpr];}
    var ctx=wc.getContext('2d'),totalLen=0;
    for(var i=1;i<pathPts.length;i++){
      var a=toPx(pathPts[i-1][0],pathPts[i-1][1]),b=toPx(pathPts[i][0],pathPts[i][1]);
      totalLen+=Math.sqrt(Math.pow(b[0]-a[0],2)+Math.pow(b[1]-a[1],2));
    }
    var drawn=0,speed=totalLen/55,phase=0,wobbleT=0;
    function animate(){
      ctx.clearRect(0,0,wc.width,wc.height);
      ctx.fillStyle='#120818';ctx.fillRect(0,0,wc.width,wc.height);
      ctx.strokeStyle='rgba(255,107,179,0.06)';ctx.lineWidth=0.6;
      for(var i=0;i<=GN;i++){
        ctx.beginPath();ctx.moveTo((ox+i*cs2)*dpr,oy*dpr);ctx.lineTo((ox+i*cs2)*dpr,(oy+GN*cs2)*dpr);ctx.stroke();
        ctx.beginPath();ctx.moveTo(ox*dpr,(oy+i*cs2)*dpr);ctx.lineTo((ox+GN*cs2)*dpr,(oy+i*cs2)*dpr);ctx.stroke();
      }
      if(phase===0){
        drawn=Math.min(drawn+speed,totalLen);
        ctx.strokeStyle='#ff6bb3';ctx.lineWidth=cs2*dpr*0.22;ctx.lineCap='round';ctx.lineJoin='round';
        ctx.beginPath();
        var rem=drawn,pp=toPx(pathPts[0][0],pathPts[0][1]);ctx.moveTo(pp[0],pp[1]);
        for(var i=1;i<pathPts.length&&rem>0;i++){
          var pa=toPx(pathPts[i-1][0],pathPts[i-1][1]),pb=toPx(pathPts[i][0],pathPts[i][1]);
          var sl=Math.sqrt(Math.pow(pb[0]-pa[0],2)+Math.pow(pb[1]-pa[1],2));
          if(rem>=sl){ctx.lineTo(pb[0],pb[1]);rem-=sl;}
          else{var t2=rem/sl;ctx.lineTo(pa[0]+(pb[0]-pa[0])*t2,pa[1]+(pb[1]-pa[1])*t2);rem=0;}
        }
        ctx.stroke();
        if(drawn>=totalLen){
          phase=1;wobbleT=0;spawnStars();spawnStars();
          // ★ Animal sound fires here, after draw animation completes
          var sndFn=ANIMAL_SND_BY_IDX[cur.idx];
          if(sndFn){setTimeout(sndFn,200);}
          // TTS: «Котик нарисован!»
          setTimeout(function(){speak(cur.name+' нарисован!');},600);
        }
      } else {
        wobbleT+=0.006;
        ctx.save();ctx.strokeStyle='#e040fb';ctx.lineWidth=cs2*dpr*0.5;ctx.lineCap='round';ctx.lineJoin='round';ctx.globalAlpha=0.12;
        ctx.beginPath();var pp2=toPx(pathPts[0][0],pathPts[0][1]);ctx.moveTo(pp2[0],pp2[1]);
        for(var i=1;i<pathPts.length;i++){var pp3=toPx(pathPts[i][0],pathPts[i][1]);ctx.lineTo(pp3[0],pp3[1]);}
        ctx.stroke();ctx.restore();
        ctx.strokeStyle='#ff6bb3';ctx.lineWidth=cs2*dpr*0.22;ctx.lineCap='round';ctx.lineJoin='round';ctx.globalAlpha=1;
        ctx.beginPath();pp2=toPx(pathPts[0][0],pathPts[0][1]);ctx.moveTo(pp2[0],pp2[1]);
        for(var i=1;i<pathPts.length;i++){pp3=toPx(pathPts[i][0],pathPts[i][1]);ctx.lineTo(pp3[0],pp3[1]);}
        ctx.stroke();
        var sparkPos=(wobbleT%1)*totalLen,rem3=sparkPos,sparkX=0,sparkY=0;
        for(var i=1;i<pathPts.length;i++){
          var pa2=toPx(pathPts[i-1][0],pathPts[i-1][1]),pb2=toPx(pathPts[i][0],pathPts[i][1]);
          var sl2=Math.sqrt(Math.pow(pb2[0]-pa2[0],2)+Math.pow(pb2[1]-pa2[1],2));
          if(rem3<=sl2){var t3=rem3/sl2;sparkX=pa2[0]+(pb2[0]-pa2[0])*t3;sparkY=pa2[1]+(pb2[1]-pa2[1])*t3;break;}
          rem3-=sl2;
        }
        var grad=ctx.createRadialGradient(sparkX,sparkY,0,sparkX,sparkY,cs2*dpr*1.0);
        grad.addColorStop(0,'rgba(255,255,255,1)');grad.addColorStop(0.25,'#ff6bb3');grad.addColorStop(1,'rgba(0,0,0,0)');
        ctx.beginPath();ctx.arc(sparkX,sparkY,cs2*dpr*1.0,0,Math.PI*2);ctx.fillStyle=grad;ctx.globalAlpha=0.9;ctx.fill();
        ctx.beginPath();ctx.arc(sparkX,sparkY,cs2*dpr*0.15,0,Math.PI*2);ctx.fillStyle='#fff';ctx.globalAlpha=1;ctx.fill();
      }
      winAnimFrame=requestAnimationFrame(animate);
    }
    show(sWin);winAnimFrame=requestAnimationFrame(animate);
  },300);
}

document.getElementById('back-btn').onclick=function(){
  SND.back();
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  if(winAnimFrame){cancelAnimationFrame(winAnimFrame);winAnimFrame=null;}
  show(sMenu);buildMenu();
};
document.getElementById('retry-btn').onclick=function(){SND.pop();startGame(cur.idx);};
document.getElementById('menu-btn2').onclick=function(){
  SND.back();
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  if(winAnimFrame){cancelAnimationFrame(winAnimFrame);winAnimFrame=null;}
  show(sMenu);buildMenu();
};

if(window.ResizeObserver){
  new ResizeObserver(function(){
    if(!sGame.classList.contains('hidden')&&canvasWrap.offsetWidth>0)initCanvas();
  }).observe(canvasWrap);
}

})();
</script>
